{% set version = "1.0.4" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-n2r
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/N2R_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/N2R/N2R_{{ version }}.tar.gz
  sha256: 944d12e2c958183daf4c43a636df0dba14671e405b68b16bcbdd8a948037009d
  patches:
    - patches/0001-use-AR-variable.patch

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - _openmp_mutex                # [linux]
    - llvm-openmp                  # [osx]
    - r-base
    - r-matrix
    - r-rcpp >=1.0.4
    - r-rcppeigen
    - r-rcppspdlog
  run:
    - _openmp_mutex                # [linux]
    - llvm-openmp                  # [osx]
    - r-base
    - r-matrix
    - r-rcpp >=1.0.4
    - r-rcppeigen
    - r-rcppspdlog

test:
  commands:
    - $R -e "library('N2R')"           # [not win]
    - "\"%R%\" -e \"library('N2R')\""  # [win]

about:
  home: https://github.com/kharchenkolab/N2R
  license: Apache-2.0
  summary: Implements methods to perform fast approximate K-nearest neighbor search on input matrix. Algorithm based on the 'N2' implementation of an approximate nearest neighbor search using hierarchical  Navigable Small World (NSW) graphs. The original algorithm is described in "Efficient and Robust Approximate 
    Nearest Neighbor Search Using Hierarchical Navigable Small World Graphs", Y. Malkov and D. Yashunin, <doi:10.1109/TPAMI.2018.2889473>, <arXiv:1603.09320>.
  license_family: APACHE
  license_file:
    - LICENSE-2.0.txt

extra:
  recipe-maintainers:
    - conda-forge/r
